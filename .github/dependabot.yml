version: 2
updates:
  # Maven dependencies (POI, OkHttp, JavaFX, Gson, JUnit, Lombok, ...).
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      maven-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used by the CI and release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
