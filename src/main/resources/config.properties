# bipApi client configuration.
#
# Override any value at runtime without editing this file:
#   * JVM flag:  mvn javafx:run -Dbip.api.base-url=http://my-host:28242/bipapi/
#   * Env var:   BIP_API_BASE_URL=http://my-host:28242/bipapi/
# Precedence: system property > environment variable > this file > built-in default.

# Base URL of the bipApi server (note the trailing slash).
bip.api.base-url=http://localhost:28242/bipapi/

# Default path pre-filled in the "work with Excel" dialog. Leave blank for no default.
bip.xlsx.default-path=
